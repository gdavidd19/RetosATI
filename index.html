<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATI[UCV]Log 2026-1</title>
    <link rel="icon" sizes="32x32" href="..\icon\cropped-logonuevo-32x32.png">
    <link rel="icon" sizes="192x192" href="..\icon\cropped-logonuevo-192x192.png">
    <style>
        @import url("../css/_theme.css");

        body{
            font-family: var(--primary-font);
            font-size: 24px;
            margin: 0px;
            background-color: rgba(235, 235, 235, 1);
        }

        header{
            background-color: var(--main-color);
            display: flex;
            padding: 25px 70px 25px 70px;
        }

        .titulo{
            color: white;
            font-size: 76px;
            font-weight: 700;
            margin-left: 0px;
            margin-right: 0px;
            margin-top: 0px;
            margin-bottom: 0px;
        }

        #ucv{
            font-size: 32px;
            font-weight: 400;
            display: inline;
        }

        #busqueda{
            display: flex;
            margin: 15px 130px 15px 160px;
        }
        
        #campoBusqueda{
            border: none;
            height: 45px;
            width: 350px;
            border-radius: 25px 0px 0px 25px;
            font-size: 20px;
            margin: 0px;
            padding: 10px;
        }

        #botonBusqueda{
            border: none;
            height: 65px;
            width: 170px;
            margin: 0px;
            border-radius: 0px 25px 25px 0px;
            color: white;
            font-size: 20px;
            background-color: var(--accent-color);
        }

        #circuloIconoUsuario{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 80px;
            background-color: var(--accent-color);
            border-radius: 100%;
            margin: 5px 0px 0px 0px
        }

        #iconoUsuario{
            width: 60px;
            height: 60px;
        }

        .separador{
            margin: 0px;
        }

        #semestre{
            font-size: 50px;
            margin: 25px 70px 25px 70px;
        }

        #perfiles{
            display: grid;
            grid-template-columns: auto auto auto;
            margin: 0px 30px 0px 30px;
        }

        .cajaPerfil{
            display: grid;
            width: 350px;
            margin: 0px 40px 50px 40px;
        }

        .fotoPerfil{
            width: 350px;
            height: 350px;
            object-fit: cover;
            object-position: center;
            border-radius: 30px 30px 0px 0px;
            margin: 0px;
        }

        .cajaNombrePerfil{
            background-color: white;
            padding: 20px 15px 20px 15px;
        }

        .nombrePerfil{
            font-size: 26px;
            margin: 0px;
        }

        .lineaInferior{
            margin: 0px;
            background-color: var(--main-color);
            height: 25px;
            border-radius: 0px 0px 30px 30px;
        }

        footer{
            font-size: 26px;
            text-align: center;
            color: gray;
            object-position: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1 class="titulo">ATI<p id="ucv">[UCV]</p>Log</h1>
        <form id="busqueda">
            <input id="campoBusqueda" placeholder="Nombre...">
            <button id="botonBusqueda" type="submit">Buscar</button>
        </form>
        <div id="circuloIconoUsuario">
            <img src="./icon/userIcon.svg" id="iconoUsuario">
        </div>
    </header>
    <hr class="separador">
    <section>
        <h2 id="semestre">Semestre 2026-1</h2>
        <div id="perfiles">
            <div class="cajaPerfil">
                <img src=".\32412330\32412330.jpg" class="fotoPerfil">
                <div class="cajaNombrePerfil"><p class="nombrePerfil">Gabriel Conde</p></div>
                <hr class="lineaInferior">
            </div>
            <div class="cajaPerfil">
                <img src=".\Dummies\Dummy1.png" class="fotoPerfil">
                <div class="cajaNombrePerfil"><p class="nombrePerfil">Helena Torres</p></div>
                <hr class="lineaInferior">
            </div>
            <div class="cajaPerfil">
                <img src=".\Dummies\Dummy2.png" class="fotoPerfil">
                <div class="cajaNombrePerfil"><p class="nombrePerfil">Carlos Blanco</p></div>
                <hr class="lineaInferior">
            </div>
            <div class="cajaPerfil">
                <img src=".\Dummies\Dummy3.png" class="fotoPerfil">
                <div class="cajaNombrePerfil"><p class="nombrePerfil">Juan Gutierrez</p></div>
                <hr class="lineaInferior">
            </div>
            <div class="cajaPerfil">
                <img src=".\Dummies\Dummy4.png" class="fotoPerfil">
                <div class="cajaNombrePerfil"><p class="nombrePerfil">Isabel Contreras</p></div>
                <hr class="lineaInferior">
            </div>
            <div class="cajaPerfil">
                <img src=".\Dummies\Dummy5.png" class="fotoPerfil">
                <div class="cajaNombrePerfil"><p class="nombrePerfil">Gabriel Vargas</p></div>
                <hr class="lineaInferior">
            </div>
        </div>
    </section>
    <hr class="separador">
    <footer>
        Copyright © 2026 Escuela de computación - ATI. Todos los derechos reservados
    </footer>
</body>
</html>
